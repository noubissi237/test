<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulateur d'intérêts composés</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Spline+Sans+Mono:wght@400;500;600&display=swap');

  :root {
    --bg: #0d1b17;
    --panel: #12241e;
    --line: #1f3c31;
    --ink: #e8f3ed;
    --muted: #7fa593;
    --gold: #d4a24e;
    --mint: #4fd99a;
    --accent2: #6fb6ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Spline Sans Mono', monospace;
    background: radial-gradient(120% 120% at 80% 0%, #163029 0%, var(--bg) 55%);
    color: var(--ink);
    min-height: 100vh;
    padding: 32px 18px 60px;
    line-height: 1.5;
  }
  .wrap { max-width: 1040px; margin: 0 auto; }
  header { margin-bottom: 28px; }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: clamp(28px, 5vw, 46px);
    letter-spacing: -0.02em;
    line-height: 1.05;
  }
  h1 em { color: var(--gold); font-style: italic; }
  .sub { color: var(--muted); margin-top: 8px; font-size: 14px; }

  .tabs { display: flex; gap: 8px; margin: 26px 0 18px; flex-wrap: wrap; }
  .tab {
    font-family: 'Spline Sans Mono', monospace;
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--muted);
    padding: 12px 18px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 13px;
    transition: .2s;
  }
  .tab.active { color: var(--bg); background: var(--mint); border-color: var(--mint); font-weight: 600; }
  .tab small { display: block; font-size: 10px; opacity: .8; margin-top: 2px; }

  .grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 18px; }
  @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 24px;
  }
  .formula {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    text-align: center;
    padding: 18px;
    background: #0c1814;
    border-radius: 12px;
    border: 1px solid var(--line);
    margin-bottom: 22px;
    color: var(--gold);
    letter-spacing: .01em;
  }
  .formula sub { font-size: .6em; }
  .formula sup { font-size: .65em; }

  label { display: block; font-size: 12px; color: var(--muted); margin: 16px 0 6px; }
  .field { display: flex; align-items: center; gap: 10px; }
  input[type=number] {
    width: 100%;
    background: #0c1814;
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: inherit;
    font-size: 15px;
  }
  input:focus { outline: none; border-color: var(--mint); }
  .unit { color: var(--muted); font-size: 13px; white-space: nowrap; }
  .hidden { display: none; }

  .results { display: flex; flex-direction: column; gap: 14px; }
  .big {
    text-align: center;
    padding: 8px 0 4px;
  }
  .big .lbl { font-size: 12px; color: var(--muted); }
  .big .val {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: clamp(34px, 7vw, 54px);
    color: var(--mint);
    letter-spacing: -0.02em;
  }
  .breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat {
    background: #0c1814;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px;
  }
  .stat .k { font-size: 11px; color: var(--muted); }
  .stat .v { font-size: 18px; margin-top: 4px; }
  .stat .v.gold { color: var(--gold); }
  .stat .v.acc { color: var(--accent2); }

  .chart { margin-top: 4px; }
  svg { width: 100%; height: 200px; display: block; }
  .legend { display: flex; gap: 16px; justify-content: center; font-size: 11px; color: var(--muted); margin-top: 8px; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 3px; margin-right: 5px; vertical-align: middle; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Intérêts <em>composés</em></h1>
    <p class="sub">Deux formules, un même principe : l'argent qui génère de l'argent, qui génère de l'argent…</p>
  </header>

  <div class="tabs">
    <button class="tab active" data-mode="simple" onclick="setMode('simple')">
      Capital seul
      <small>placement unique</small>
    </button>
    <button class="tab" data-mode="annuity" onclick="setMode('annuity')">
      Versements réguliers
      <small>épargne périodique</small>
    </button>
  </div>

  <div class="grid">
    <div class="card">
      <div class="formula" id="formula"></div>

      <div id="f-simple">
        <label>Capital initial — C<sub>initial</sub></label>
        <div class="field"><input type="number" id="capital" value="10000"><span class="unit">€</span></div>
      </div>

      <div id="f-annuity" class="hidden">
        <label>Versement par période — P</label>
        <div class="field"><input type="number" id="payment" value="200"><span class="unit">€</span></div>
      </div>

      <label>Taux par période — r</label>
      <div class="field"><input type="number" id="rate" value="5" step="0.1"><span class="unit">% / an</span></div>

      <label>Nombre de périodes — n</label>
      <div class="field"><input type="number" id="periods" value="20"><span class="unit">ans</span></div>
    </div>

    <div class="card results">
      <div class="big">
        <div class="lbl">Capital final — C<sub>final</sub></div>
        <div class="val" id="out-final">—</div>
      </div>
      <div class="breakdown">
        <div class="stat"><div class="k" id="k-invested">Total investi</div><div class="v acc" id="out-invested">—</div></div>
        <div class="stat"><div class="k">Intérêts gagnés</div><div class="v gold" id="out-interest">—</div></div>
      </div>
      <div class="chart">
        <svg id="chart" viewBox="0 0 400 200" preserveAspectRatio="none"></svg>
        <div class="legend">
          <span><span class="dot" style="background:var(--accent2)"></span>Versé</span>
          <span><span class="dot" style="background:var(--mint)"></span>Total avec intérêts</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let mode = 'simple';
const $ = id => document.getElementById(id);
const fmt = v => new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0}).format(v) + ' €';

function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === m));
  $('f-simple').classList.toggle('hidden', m !== 'simple');
  $('f-annuity').classList.toggle('hidden', m !== 'annuity');
  $('k-invested').textContent = m === 'simple' ? 'Capital de départ' : 'Total versé';
  $('formula').innerHTML = m === 'simple'
    ? 'C<sub>final</sub> = C<sub>initial</sub> × (1 + r)<sup>n</sup>'
    : 'C<sub>final</sub> = P × [ (1+r)<sup>n</sup> − 1 ] / r × (1 + r)';
  calc();
}

function series() {
  const r = (+$('rate').value || 0) / 100;
  const n = Math.max(0, Math.round(+$('periods').value || 0));
  const pts = [];
  if (mode === 'simple') {
    const C = +$('capital').value || 0;
    for (let i = 0; i <= n; i++) pts.push({ invested: C, total: C * Math.pow(1+r, i) });
  } else {
    const P = +$('payment').value || 0;
    for (let i = 0; i <= n; i++) {
      const total = r === 0 ? P*i : P * ((Math.pow(1+r,i)-1)/r) * (1+r);
      pts.push({ invested: P*i, total });
    }
  }
  return pts;
}

function calc() {
  const pts = series();
  const last = pts[pts.length-1];
  $('out-final').textContent = fmt(last.total);
  $('out-invested').textContent = fmt(last.invested);
  $('out-interest').textContent = fmt(last.total - last.invested);
  draw(pts);
}

function draw(pts) {
  const W=400, H=200, pad=4;
  const max = Math.max(...pts.map(p=>p.total), 1);
  const x = i => pad + i/(pts.length-1 || 1)*(W-2*pad);
  const y = v => H-pad - v/max*(H-2*pad);
  const path = key => pts.map((p,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(p[key]).toFixed(1)).join(' ');
  const area = pts.map((p,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(p.total).toFixed(1)).join(' ')
    + ` L ${x(pts.length-1)} ${H-pad} L ${x(0)} ${H-pad} Z`;
  $('chart').innerHTML = `
    <path d="${area}" fill="rgba(79,217,154,.12)"/>
    <path d="${path('total')}" fill="none" stroke="var(--mint)" stroke-width="2.5"/>
    <path d="${path('invested')}" fill="none" stroke="var(--accent2)" stroke-width="2" stroke-dasharray="4 4"/>`;
}

document.querySelectorAll('input').forEach(i => i.addEventListener('input', calc));
setMode('simple');
</script>
</body>
</html>
